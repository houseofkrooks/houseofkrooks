<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>House of Krooks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000000 70%);
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    img {
      max-width: 700px;
      width: 90%;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 20px rgba(255,60,0,0.6));
    }

    h1 {
      font-size: 22px;
      color: #aaa;
      margin-bottom: 30px;
    }

    button {
      background: linear-gradient(90deg, #ff3c00, #ff7a00);
      border: none;
      padding: 15px 35px;
      font-size: 16px;
      border-radius: 30px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255,60,0,0.6);
    }
  </style>
</head>

<body>

<div class="hero">
  <img src="logo.png" />
  <h1>Frame & Frequency – Audio. Visual. Live.</h1>
  <button>Contact</button>
</div>

</body>
</html>
